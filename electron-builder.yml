appId: net.stealthpos.installer
productName: StealthPOS Connector
directories:
  output: dist
  buildResources: build
files:
  - main.js
  - preload.js
  - detect.cjs
  - renderer/**/*
  - package.json
extraResources:
  - from: resources/edge.cjs
    to: edge.cjs
  - from: resources/nssm.exe
    to: nssm.exe
  - from: resources/node.exe
    to: node.exe
publish:
  provider: github
  owner: Creative-Loop-LLC
  repo: stealthpos-installer
win:
  target: nsis
  requestedExecutionLevel: requireAdministrator
  artifactName: ${productName} Setup ${version}.${ext}
nsis:
  include: build/installer.nsh
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
